<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Dokumen Digital - MMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --blue-royal: #1a73e8;
            --text-dark: #202124;
            --text-grey: #5f6368;
            --bg-page: #f8f9fa;
            --border-light: #e0e0e0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        /* HEADER */
        .header-badge {
            background-color: var(--blue-royal);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .shield-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-check-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 0;
        }

        .card-content {
            padding: 30px 24px;
        }

        /* BRANDING ALITA */
        #section-alita {
            display: none;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f1f1;
        }
        .logo-alita { height: 65px; width: auto; }
        .brand-name { font-size: 15px; font-weight: 700; color: #0d47a1; margin: 0; }
        .motto { font-size: 10px; font-style: italic; color: var(--text-grey); margin: 2px 0 0 0; }

        /* LIST DATA DENGAN LINE ICONS TIPIS */
        .info-item {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .line-icon {
            font-size: 18px;
            color: #9aa0a6; /* Warna abu-abu tipis agar minimalis */
            width: 20px;
            display: flex;
            justify-content: center;
            margin-top: 3px;
            font-weight: 300; /* Membuat ikon lebih tipis */
        }

        .info-body {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 9px;
            font-weight: 700;
            color: #bdc1c6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-dark);
        }

        .font-bold { font-weight: 700; }
        .id-mono { 
            font-family: 'Courier New', monospace; 
            color: var(--blue-royal); 
            font-weight: 700;
        }

        /* FOOTER VERIFIKASI */
        .status-footer {
            margin-top: 10px;
            padding: 16px;
            background-color: #f8faff;
            border-radius: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .mini-check {
            width: 18px;
            height: 18px;
            object-fit: contain;
            margin-top: 2px;
        }

        .status-text {
            font-size: 12px;
            color: #5f6368;
            line-height: 1.6;
            margin: 0;
        }

        .status-text b { color: var(--blue-royal); }

    </style>
</head>
<body>

    <div class="card">
        <div class="header-badge">
            <div class="shield-wrapper">
                <img src="centang_biru.png" class="shield-check-img" alt="Verified">
            </div>
            <p class="header-title">Dokumen Terverifikasi</p>
        </div>

        <div class="card-content">
            <div id="section-alita">
                <img src="LOGO ALITA BARU.png" class="logo-alita" alt="Logo Alita">
                <div>
                    <p class="brand-name">KLINIK ALITA MEDIKA</p>
                    <p class="motto">"kepuasan pelanggan adalah kebahagian kami"</p>
                </div>
            </div>

            <div class="info-item">
                <div class="line-icon"><i class="fa-regular fa-user"></i></div>
                <div class="info-body">
                    <span class="info-label">Ditandatangani Oleh</span>
                    <span class="info-value font-bold">Ns. Miftahul Munir S, S. Kep., CWCCA., CHLQM.</span>
                </div>
            </div>

            <div class="info-item">
                <div class="line-icon"><i class="fa-regular fa-calendar-check"></i></div>
                <div class="info-body">
                    <span class="info-label">Tanggal & Waktu</span>
                    <span id="txt-time" class="info-value">-</span>
                </div>
            </div>

            <div class="info-item">
                <div class="line-icon"><i class="fa-regular fa-id-badge"></i></div>
                <div class="info-body">
                    <span class="info-label">ID Dokumen</span>
                    <span id="txt-id" class="info-value id-mono">-</span>
                </div>
            </div>

            <div class="info-item">
                <div class="line-icon"><i class="fa-regular fa-file-lines"></i></div>
                <div class="info-body">
                    <span class="info-label">Nama Dokumen</span>
                    <span id="txt-doc" class="info-value">-</span>
                </div>
            </div>

            <div class="status-footer">
                <img src="centang_biru.png" class="mini-check" alt="Check">
                <p class="status-text">
                    Verifikasi: Dokumen ini telah divalidasi oleh sistem <b>MMS Digital Signature</b> dan dinyatakan asli.
                </p>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Logika Tampil Logo Alita
        const pname = params.get('pname') ? decodeURIComponent(params.get('pname')).toLowerCase() : '';
        if (pname.includes('alita medika')) {
            document.getElementById('section-alita').style.display = 'flex';
        }

        // Tampilkan Data
        document.getElementById('txt-doc').innerText = decodeURIComponent(params.get('doc') || 'Dokumen Resmi');
        document.getElementById('txt-time').innerText = decodeURIComponent(params.get('time') || '-');
        
        const idRaw = params.get('id');
        try {
            document.getElementById('txt-id').innerText = idRaw ? atob(idRaw) : 'UNREGISTERED';
        } catch(e) {
            document.getElementById('txt-id').innerText = idRaw || 'UNREGISTERED';
        }
    </script>
</body>
</html>
