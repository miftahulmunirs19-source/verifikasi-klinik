<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Digital - MMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --blue-munirs: #0f6fb0; 
            --text-dark: #1a1c1e;
            --text-grey: #5f6368;
            --bg-page: #f0f3f6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-page);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box;
        }

        .card {
            background-color: white; width: 100%; max-width: 440px;
            border-radius: 24px; box-shadow: 0 20px 50px rgba(15, 111, 176, 0.15);
            overflow: hidden; border: 1px solid #d1d9e0;
        }

        /* HEADER DENGAN LOGO BESAR */
        .header-badge {
            background-color: var(--blue-munirs); color: white;
            padding: 30px 24px; display: flex; align-items: center; gap: 20px;
        }

        .shield-container {
            position: relative; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .img-shield { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        
        /* CENTANG BIRU DIPERBESAR */
        .img-check { position: relative; width: 34px; height: 34px; z-index: 2; }

        .header-title {
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1.5px; margin: 0;
        }

        .card-content { padding: 30px 28px; }

        /* BRANDING ALITA (JARAK PROPORSIONAL) */
        #section-alita {
            display: none; align-items: center; gap: 18px;
            margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0;
        }
        .logo-alita { height: 70px; width: auto; }
        .brand-name { font-size: 16px; font-weight: 700; color: #0d47a1; margin: 0; }
        .motto { font-size: 10.5px; font-style: italic; color: var(--text-grey); margin: 3px 0 0 0; }

        /* DATA ROWS */
        .info-row { display: flex; gap: 20px; margin-bottom: 25px; align-items: flex-start; }
        
        .icon-line { font-size: 22px; color: var(--blue-munirs); width: 28px; text-align: center; margin-top: 4px; }
        
        .label-pro { font-size: 10px; font-weight: 500; color: var(--text-grey); text-transform: uppercase; margin-bottom: 3px; display: block; }
        
        /* NAMA 1 BARIS & BOLD BIRU */
        .value-bold-blue { 
            font-size: 15.5px; font-weight: 700; color: var(--blue-munirs); 
            line-height: 1.3; display: block; white-space: nowrap; 
        }
        .sub-value-pro { font-size: 11px; font-weight: 400; color: var(--text-grey); margin-top: 1px; display: block; }

        /* VERIFIKASI FOOTER (KONTRAST TINGGI) */
        .info-row-footer {
            display: flex; gap: 20px; align-items: center;
            background-color: #f8faff; border: 1px solid #e1e8ed;
            border-radius: 16px; padding: 15px; margin-top: 10px;
        }

        .footer-shield-box {
            position: relative; width: 35px; height: 35px;
            background-color: var(--blue-munirs); /* Background biru agar perisai putih terlihat */
            border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .status-text { font-size: 12.5px; color: var(--text-grey); line-height: 1.5; margin: 0; }
        .status-text b { color: var(--blue-munirs); }

    </style>
</head>
<body>

    <div class="card">
        <div class="header-badge">
            <div class="shield-container">
                <img src="https://raw.githubusercontent.com/miftahulmunirs19-source/verifikasi-klinik/main/logo-shield.png" class="img-shield" alt="Shield">
                <img src="https://raw.githubusercontent.com/miftahulmunirs19-source/verifikasi-klinik/main/centang_biru.png" class="img-check" alt="Check">
            </div>
            <p class="header-title">TTD Digital Terverifikasi</p>
        </div>

        <div class="card-content">
            <div id="section-alita">
                <img src="https://raw.githubusercontent.com/miftahulmunirs19-source/verifikasi-klinik/main/LOGO%20ALITA%20BARU.png" alt="Logo Alita" class="logo-alita">
                <div class="brand-text">
                    <p class="brand-name">KLINIK ALITA MEDIKA</p>
                    <p class="motto">"kepuasan pelanggan adalah kebahagian kami"</p>
                </div>
            </div>

            <div class="info-row">
                <div class="icon-line"><i class="fa-regular fa-circle-user"></i></div>
                <div>
                    <span class="label-pro">Ditandatangani oleh</span>
                    <span class="value-bold-blue">Ns. Miftahul Munir S, S. Kep., CWCCA., CHLQM.</span>
                    <span class="sub-value-pro">Manajer Operasional</span>
                </div>
            </div>

            <div class="info-row">
                <div class="icon-line"><i class="fa-regular fa-calendar-check"></i></div>
                <div>
                    <span class="label-pro">Tanggal & Waktu</span>
                    <span id="txt-date" class="value-bold-blue">-</span>
                    <span id="txt-hour" class="sub-value-pro">-</span>
                </div>
            </div>

            <div class="info-row">
                <div class="icon-line"><i class="fa-regular fa-id-card"></i></div>
                <div>
                    <span class="label-pro">ID Dokumen</span>
                    <span id="txt-id" class="value-bold-blue" style="letter-spacing: 0.5px; font-family: monospace;">-</span>
                </div>
            </div>

            <div class="info-row">
                <div class="icon-line"><i class="fa-regular fa-file-lines"></i></div>
                <div>
                    <span class="label-pro">Nama dokumen</span>
                    <span id="txt-doc" class="value-bold-blue">-</span>
                </div>
            </div>

            <div class="info-row-footer">
                <div class="footer-shield-box">
                    <img src="https://raw.githubusercontent.com/miftahulmunirs19-source/verifikasi-klinik/main/logo-shield.png" style="position:absolute; width:80%;" alt="Shield">
                    <img src="https://raw.githubusercontent.com/miftahulmunirs19-source/verifikasi-klinik/main/centang_biru.png" style="position:relative; width:50%; z-index:2; filter: brightness(0) invert(1);" alt="Check">
                </div>
                <p class="status-text">
                    <b>Verifikasi:</b> Dokumen ditandatangani secara digital dan <b>terenkripsi</b>.
                </p>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pname = params.get('pname') ? decodeURIComponent(params.get('pname')).toLowerCase() : '';
        if (pname.includes('alita medika')) {
            document.getElementById('section-alita').style.display = 'flex';
        }

        document.getElementById('txt-doc').innerText = decodeURIComponent(params.get('doc') || 'Dokumen Resmi');
        document.getElementById('txt-date').innerText = decodeURIComponent(params.get('time') || '-');
        document.getElementById('txt-hour').innerText = decodeURIComponent(params.get('hour') || '-');
        
        const idEnc = params.get('id');
        try {
            document.getElementById('txt-id').innerText = idEnc ? atob(idEnc) : 'UNREGISTERED';
        } catch(e) {
            document.getElementById('txt-id').innerText = idEnc || 'UNREGISTERED';
        }
    </script>
</body>
</html>
