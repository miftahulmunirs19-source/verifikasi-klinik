<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Dokumen Digital - MMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-royal: #1a73e8;
            --text-dark: #202124;
            --text-grey: #5f6368;
            --bg-page: #f8f9fa;
            --bg-card: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        /* HEADER DENGAN WARNA BIRU ROYAL */
        .header-badge {
            background-color: var(--blue-royal);
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* GUNAKAN GAMBAR PERISAI DARI BAPAK */
        .shield-icon {
            position: relative;
            width: 30px;
            height: 30px;
            background-image: url('https://miftahulmunirs19-source.github.io/verifikasi-klinik/LOGO_SHIELD.png'); /* URL gambar perisai Bapak */
            background-size: contain;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue-royal);
            font-weight: 900;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .card-content {
            padding: 30px 24px;
        }

        /* BRANDING ALITA (HIDDEN BY DEFAULT) */
        #section-alita {
            display: none;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f1f1;
        }
        .logo-alita {
            height: 75px;
            width: auto;
        }
        .brand-text {
            text-align: left;
        }
        .brand-name {
            font-size: 16px;
            font-weight: 900;
            color: #0d47a1;
            margin: 0;
        }
        .motto {
            font-size: 10.5px;
            font-style: italic;
            color: var(--text-grey);
            margin: 3px 0 0 0;
        }

        /* DATA ROWS */
        .info-row {
            display: flex;
            gap: 18px;
            margin-bottom: 22px;
            text-align: left;
        }
        .icon-box {
            font-size: 20px;
            width: 24px;
            color: var(--text-grey);
            flex-shrink: 0;
        }
        .info-label {
            font-size: 10px;
            font-weight: 700;
            color: #9aa0a6;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }
        .val-bold {
            font-weight: 700;
            font-size: 14.5px;
        }
        .id-style {
            color: var(--blue-royal);
            font-family: monospace;
            font-weight: 700;
        }

        /* FOOTER STATUS */
        .status-box {
            background-color: #f1f8ff;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        
        /* SHIELD VERSI KECIL UNTUK STATUS */
        .shield-small {
            width: 20px;
            height: 20px;
            background-image: url('https://miftahulmunirs19-source.github.io/verifikasi-klinik/LOGO_SHIELD.png'); /* URL gambar perisai Bapak */
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; /* Centang putih di dalam perisai biru */
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 3px;
        }
        
        .status-text {
            font-size: 12px;
            color: #3c4043;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-badge">
            <div class="shield-icon">✓</div>
            <p class="header-title">TTD Digital Terverifikasi</p>
        </div>

        <div class="card-content">
            <div id="section-alita">
                <img src="https://miftahulmunirs19-source.github.io/verifikasi-klinik/LOGO%20ALITA%20BARU.png" alt="Logo Alita" class="logo-alita">
                <div class="brand-text">
                    <p class="brand-name">KLINIK ALITA MEDIKA</p>
                    <p class="motto">"kepuasan pelanggan adalah kebahagian kami"</p>
                </div>
            </div>

            <div class="info-row">
                <div class="icon-box">👤</div>
                <div>
                    <div class="info-label">Ditandatangani Oleh</div>
                    <div class="info-value val-bold">Ns. Miftahul Munir S, S. Kep., CWCCA., CHLQM.http://googleusercontent.com/image_generation_content/0
